<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group The Form Fields | Registration</title>
</head>
<body>

<h1> User Registration Form</h1>
<p>Please fill in your details below. All fields are required.</p>

<form action="#" method="post">
    <!-- Grouped section using fieldset and legend -->
    <fieldset>
        <legend> Personal Information (Required)</legend>

        <!-- Full Name with placeholder -->
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" placeholder="e.g., Gyan Abhijeet" required><br><br>

        <!-- Email with proper input type -->
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="gyan@gamil.com" required><br><br>

        <!-- Gender using radio buttons -->
        <label>Gender:</label><br>
        <input type="radio" id="gender_female" name="gender" value="Female">
        <label for="gender_female">Female</label><br>
        <input type="radio" id="gender_male" name="gender" value="Male">
        <label for="gender_male">Male</label><br>
        <input type="radio" id="gender_other" name="gender" value="Other">
        <label for="gender_other">Other</label><br><br>

        <!-- Date of birth using date picker -->
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <!-- Submit button to send form -->
        <input type="submit" value="Register Now">
        <input type="reset" value="Clear Form">
    </fieldset>
</form>

<p><small>Your information is kept private and secure.</small></p>

</body>
</html>
